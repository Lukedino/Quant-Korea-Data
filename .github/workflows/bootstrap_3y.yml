name: "Bootstrap 3Y — 최근 3년치"

on:
  workflow_dispatch:
    inputs:
      skip_prices:
        description: '일별 주가 수집 생략'
        type: boolean
        default: false
      skip_market:
        description: '시장 스냅샷(PER/PBR) 수집 생략'
        type: boolean
        default: false
      skip_financials:
        description: '재무제표 수집 생략'
        type: boolean
        default: false
      force:
        description: '완료된 월도 재수집'
        type: boolean
        default: false
      dry_run:
        description: '테스트 실행 (저장 없음)'
        type: boolean
        default: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 200
    # 체크포인트 덕분에 재실행 시 완료된 월은 자동 스킵

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup Google Drive token
        env:
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
        run: |
          mkdir -p data
          python -c "import base64,os; open('data/oauth_token.json','wb').write(base64.b64decode(''.join(os.environ['GDRIVE_TOKEN'].split())))"
          echo "GDRIVE_TOKEN_PATH=data/oauth_token.json" >> $GITHUB_ENV

      - name: Bootstrap (최근 3년)
        env:
          DART_API_KEY:     ${{ secrets.DART_API_KEY }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          ARGS="--mode bootstrap --years-range 3 --upload-drive"
          ${{ inputs.skip_prices }}    && ARGS="$ARGS --skip-prices"
          ${{ inputs.skip_market }}    && ARGS="$ARGS --skip-market"
          ${{ inputs.skip_financials }} && ARGS="$ARGS --skip-financials"
          ${{ inputs.force }}           && ARGS="$ARGS --force"
          ${{ inputs.dry_run }}         && ARGS="$ARGS --dry-run"
          python main.py $ARGS

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-3y-${{ github.run_id }}
          path: collection.log

      - name: Cleanup credentials
        if: always()
        run: rm -f gdrive_creds.json data/oauth_token.json
