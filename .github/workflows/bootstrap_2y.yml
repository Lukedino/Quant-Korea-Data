name: Bootstrap 2Y (2024년)

on:
  workflow_dispatch:
    inputs:
      skip_prices:
        description: '일별 주가 수집 생략 (true/false)'
        required: false
        default: 'false'
      skip_financials:
        description: '재무제표 수집 생략 (true/false)'
        required: false
        default: 'false'
      force:
        description: '완료된 월도 재수집 (true/false)'
        required: false
        default: 'false'
      dry_run:
        description: '테스트 실행 - 저장 없음 (true/false)'
        required: false
        default: 'false'

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decode Google credentials
        run: |
          echo "${{ secrets.GDRIVE_CREDENTIALS }}" | base64 -d > gdrive_creds.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=gdrive_creds.json" >> $GITHUB_ENV

      - name: Run bootstrap (2년 전 = 2024년)
        env:
          DART_API_KEY:    ${{ secrets.DART_API_KEY }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          ARGS="--mode bootstrap --years-ago 2 --upload-drive"
          [ "${{ inputs.skip_prices }}"    = "true" ] && ARGS="$ARGS --skip-prices"
          [ "${{ inputs.skip_financials }}" = "true" ] && ARGS="$ARGS --skip-financials"
          [ "${{ inputs.force }}"           = "true" ] && ARGS="$ARGS --force"
          [ "${{ inputs.dry_run }}"         = "true" ] && ARGS="$ARGS --dry-run"
          python main.py $ARGS

      - name: Upload collection log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collection-log-2y-${{ github.run_id }}
          path: collection.log

      - name: Clean up credentials
        if: always()
        run: rm -f gdrive_creds.json
