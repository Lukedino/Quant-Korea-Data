name: "Bootstrap MAX — 2010년부터 전체"

on:
  workflow_dispatch:
    inputs:
      year_start:
        description: '수집 시작 연도 (기본: 2010)'
        required: false
        default: '2010'
      skip_prices:
        description: '일별 주가 수집 생략'
        type: boolean
        default: false
      skip_market:
        description: '시장 스냅샷(PER/PBR) 수집 생략'
        type: boolean
        default: false
      skip_financials:
        description: '재무제표 수집 생략 (MAX에서는 true 권장 — 별도 실행)'
        type: boolean
        default: true
      force:
        description: '완료된 월도 재수집'
        type: boolean
        default: false
      dry_run:
        description: '테스트 실행 (저장 없음)'
        type: boolean
        default: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    # 체크포인트 덕분에 재실행 시 완료된 월은 자동 스킵
    # MAX 수집은 여러 번 재실행으로 이어서 진행

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup Google Drive token
        env:
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
        run: |
          mkdir -p data
          python -c "import base64,os; open('data/oauth_token.json','wb').write(base64.b64decode(''.join(os.environ['GDRIVE_TOKEN'].split())))"
          echo "GDRIVE_TOKEN_PATH=data/oauth_token.json" >> $GITHUB_ENV

      - name: Bootstrap (최대치 — ${{ inputs.year_start }}년부터)
        env:
          DART_API_KEY:     ${{ secrets.DART_API_KEY }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          ARGS="--mode bootstrap --year-start ${{ inputs.year_start }} --upload-drive"
          ${{ inputs.skip_prices }}    && ARGS="$ARGS --skip-prices"
          ${{ inputs.skip_market }}    && ARGS="$ARGS --skip-market"
          ${{ inputs.skip_financials }} && ARGS="$ARGS --skip-financials"
          ${{ inputs.force }}           && ARGS="$ARGS --force"
          ${{ inputs.dry_run }}         && ARGS="$ARGS --dry-run"
          python main.py $ARGS

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-max-${{ github.run_id }}
          path: collection.log

      - name: Cleanup credentials
        if: always()
        run: rm -f gdrive_creds.json data/oauth_token.json
