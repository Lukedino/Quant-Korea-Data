name: "Daily Incremental — 증분 수집"

on:
  schedule:
    # 매일 18:30 KST (UTC 09:30), 월~금 장마감 후
    - cron: '30 9 * * 1-5'
  workflow_dispatch:
    inputs:
      skip_prices:
        description: '일별 주가 수집 생략'
        type: boolean
        default: false
      dry_run:
        description: '테스트 실행 (저장 없음)'
        type: boolean
        default: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decode Google credentials
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
        run: |
          python -c "import base64,os; open('gdrive_creds.json','wb').write(base64.b64decode(''.join(os.environ['GDRIVE_CREDENTIALS'].split())))"
          echo "GOOGLE_APPLICATION_CREDENTIALS=gdrive_creds.json" >> $GITHUB_ENV

      - name: Daily incremental collection
        env:
          DART_API_KEY:     ${{ secrets.DART_API_KEY }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          ARGS="--mode daily --upload-drive"
          ${{ inputs.skip_prices }} && ARGS="$ARGS --skip-prices"
          ${{ inputs.dry_run }}     && ARGS="$ARGS --dry-run"
          python main.py $ARGS

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-log-${{ github.run_id }}
          path: collection.log
          retention-days: 7

      - name: Cleanup credentials
        if: always()
        run: rm -f gdrive_creds.json
