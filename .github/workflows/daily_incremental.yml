name: Daily Incremental Collection

on:
  schedule:
    # 매일 18:30 KST (UTC 09:30), 월~금
    - cron: '30 9 * * 1-5'
  workflow_dispatch:
    inputs:
      skip_prices:
        description: '일별 주가 수집 생략 (true/false)'
        required: false
        default: 'false'
      dry_run:
        description: '테스트 실행 - 저장 없음 (true/false)'
        required: false
        default: 'false'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decode Google credentials
        run: |
          echo "${{ secrets.GDRIVE_CREDENTIALS }}" | base64 -d > gdrive_creds.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=gdrive_creds.json" >> $GITHUB_ENV

      - name: Run daily collection
        env:
          DART_API_KEY:    ${{ secrets.DART_API_KEY }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          ARGS="--mode daily --upload-drive"
          [ "${{ inputs.skip_prices }}" = "true" ] && ARGS="$ARGS --skip-prices"
          [ "${{ inputs.dry_run }}"     = "true" ] && ARGS="$ARGS --dry-run"
          python main.py $ARGS

      - name: Upload collection log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-log-${{ github.run_id }}
          path: collection.log
          retention-days: 7

      - name: Clean up credentials
        if: always()
        run: rm -f gdrive_creds.json
